<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指尖英雄 - 綜合打字練習遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #334155;
        }

        #app {
            width: 100%;
            max-width: 1000px;
            min-height: 650px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .timer-bar {
            transition: width 0.1s linear;
        }

        .feedback-pop {
            animation: pop-in-out 1.2s ease-in-out forwards;
        }

        @keyframes pop-in-out {
            0% { opacity: 0; transform: translate(-50%, -45%) scale(0.9); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -55%) scale(0.9); }
        }

        /* 練習區域基礎 */
        #target-main {
            font-size: 4rem;
            line-height: 1.3;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        /* --- 台灣國小課本注音排版 --- */
        .char-unit {
            display: inline-flex;
            align-items: center;
            margin: 0.4rem;
            position: relative;
        }
        .char-text {
            font-size: 2.8rem;
            font-weight: 700;
            color: #1e293b;
            line-height: 1;
        }
        .zhuyin-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            margin-left: 4px;
            position: relative;
            height: 2.8rem;
        }
        .zhuyin-symbols {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 0.85rem;
            color: #ef4444; 
            line-height: 1;
            letter-spacing: -2px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .tone-side {
            font-size: 0.85rem;
            color: #ef4444;
            line-height: 1;
            margin-left: 1px;
            font-weight: bold;
        }
        .tone-top {
            position: absolute;
            top: -0.4rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.85rem;
            color: #ef4444;
            font-weight: bold;
        }
        
        .symbol-text {
            font-size: 2.5rem;
            color: #94a3b8;
            margin: 0 0.2rem;
        }

        .pinyin-assist {
            font-size: 1.5rem;
            color: #3b82f6;
            font-weight: 600;
            margin-top: 0.5rem;
            width: 100%;
        }

        .english-translation {
            font-size: 1.5rem;
            color: #64748b;
            font-weight: 500;
            margin-top: 1rem;
            width: 100%;
        }

        #typing-input {
            font-size: 1.8rem;
        }

        .centered-feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            width: 90%;
            max-width: 500px;
        }

        .action-btn {
            padding: 0.4rem 1.2rem;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .btn-pause { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .btn-pause:hover { background: #e2e8f0; }
        .btn-exit { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .btn-exit:hover { background: #fecaca; }
    </style>
</head>
<body>

    <div id="app">
        <!-- 1. 主選單 -->
        <div id="menu-screen" class="space-y-8 flex-grow flex flex-col justify-center">
            <div class="text-center">
                <h1 class="text-4xl font-bold text-slate-800 mb-2">⌨️ 打字小達人</h1>
                <p class="text-lg text-slate-500 font-bold text-blue-600">海量題庫自動擴充 - 絕對不重複機制！</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <h3 class="text-xl font-bold text-slate-700 flex items-center border-b pb-2">
                        <span class="bg-blue-500 text-white w-7 h-7 rounded-full inline-flex items-center justify-center text-sm mr-2">1</span> 選擇模式
                    </h3>
                    <div class="grid grid-cols-1 gap-2" id="mode-options">
                        <button onclick="setMode('zhuyin')" class="mode-btn p-3 border rounded-xl hover:bg-blue-50 border-slate-200 text-left transition text-slate-700">🀄 注音中打 (繁體)</button>
                        <button onclick="setMode('cangjie')" class="mode-btn p-3 border rounded-xl hover:bg-blue-50 border-slate-200 text-left transition text-slate-700">🧱 倉頡中打 (繁體)</button>
                        <button onclick="setMode('pinyin_trad')" class="mode-btn p-3 border rounded-xl hover:bg-blue-50 border-slate-200 text-left transition text-slate-700">🔡 漢語拼音 (繁體)</button>
                        <button onclick="setMode('pinyin_simp')" class="mode-btn p-3 border rounded-xl hover:bg-blue-50 border-slate-200 text-left transition text-slate-700">🇨🇳 漢語拼音 (簡體)</button>
                        <button onclick="setMode('english')" class="mode-btn p-3 border rounded-xl hover:bg-blue-50 border-slate-200 text-left transition text-slate-700">🔤 英文打字練習</button>
                        <button onclick="setMode('punctuation')" class="mode-btn p-3 border rounded-xl hover:bg-blue-50 border-slate-200 text-left transition text-slate-700">⌨️ 標點符號練習</button>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-xl font-bold text-slate-700 flex items-center border-b pb-2">
                        <span class="bg-orange-500 text-white w-7 h-7 rounded-full inline-flex items-center justify-center text-sm mr-2">2</span> 選擇難度
                    </h3>
                    <div class="grid grid-cols-1 gap-2" id="level-options">
                        <button onclick="setLevel('bronze')" class="level-btn p-3 border rounded-xl hover:bg-orange-50 border-slate-200 text-left transition text-slate-700">🥉 青銅 (入門/30秒)</button>
                        <button onclick="setLevel('silver')" class="level-btn p-3 border rounded-xl hover:bg-slate-50 border-slate-200 text-left transition text-slate-700">🥈 白銀 (進階/15秒)</button>
                        <button onclick="setLevel('gold')" class="level-btn p-3 border rounded-xl hover:bg-yellow-50 border-slate-200 text-left transition text-slate-700">🥇 王者 (專業/10秒)</button>
                        <button onclick="setLevel('hell')" class="level-btn p-3 border rounded-xl hover:bg-red-50 border-slate-200 text-left transition text-slate-700">🔥 地獄試煉 (名篇挑戰)</button>
                    </div>
                </div>
            </div>

            <div class="text-center pt-6">
                <button onclick="startGame()" class="bg-blue-600 text-white px-12 py-3 rounded-lg text-xl font-bold shadow-md hover:bg-blue-700 transition transform hover:-translate-y-0.5">
                    開始練習 🚀
                </button>
            </div>
        </div>

        <!-- 2. 遊戲畫面 -->
        <div id="game-screen" class="hidden flex-grow flex flex-col relative">
            <div class="flex justify-between items-center border-b pb-4 mb-4">
                <div class="flex items-center space-x-2">
                    <span id="display-mode" class="bg-blue-50 text-blue-600 px-4 py-1 rounded text-sm font-bold border border-blue-100">注音</span>
                    <span id="display-level" class="bg-slate-50 text-slate-600 px-4 py-1 rounded text-sm font-bold border border-slate-100 ml-2">青銅</span>
                </div>
                <div class="flex items-center space-x-6">
                    <div class="text-xl font-bold text-yellow-500">⭐ <span id="star-count">0</span></div>
                    <div class="text-sm text-slate-400 font-bold">進度: <span id="progress">1</span> / <span id="total-q-display">50</span></div>
                    <div class="flex items-center space-x-3 border-l pl-4">
                        <button onclick="togglePause()" class="action-btn btn-pause">⏸ 暫停</button>
                        <button onclick="backToMenu()" class="action-btn btn-exit">🚪 離開</button>
                    </div>
                </div>
            </div>

            <div id="timer-container" class="w-full h-2 bg-slate-100 rounded-full overflow-hidden mb-8">
                <div id="timer-bar" class="timer-bar h-full bg-blue-500 w-full"></div>
            </div>

            <div class="flex-grow flex flex-col justify-center items-center text-center space-y-8 relative">
                <div id="target-main-container" class="flex flex-col items-center">
                    <div id="target-main" class="max-w-4xl min-h-[150px]"></div>
                    <div id="assist-hint" class="w-full"></div>
                </div>

                <div class="w-full max-w-2xl relative">
                    <textarea id="typing-input" autocomplete="off" 
                        class="w-full border-b-2 border-slate-300 text-3xl text-center py-4 focus:outline-none focus:border-blue-500 transition-colors bg-transparent resize-none overflow-hidden font-medium" 
                        placeholder="在此輸入內容並按 Enter..." rows="1"></textarea>
                </div>
                <div id="article-info" class="text-sm text-slate-400 font-bold mt-4 italic"></div>
            </div>

            <!-- 反饋圖層 -->
            <div id="feedback-correct" class="hidden centered-feedback pointer-events-none text-center">
                <div class="bg-white/95 backdrop-blur shadow-2xl rounded-2xl p-8 border border-green-200">
                    <div class="text-7xl mb-2">⭐</div>
                    <div class="text-4xl font-bold text-green-600">成功！</div>
                </div>
            </div>

            <div id="feedback-wrong" class="hidden centered-feedback text-center">
                <div class="bg-white px-8 py-8 rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.2)] border-2 border-red-500">
                    <div class="text-5xl mb-2 text-red-600 font-bold">❌ 錯誤</div>
                    <div class="space-y-4 text-left text-lg border-y py-6 my-6 border-slate-100 max-h-[300px] overflow-y-auto">
                        <p class="text-slate-500 font-bold">你輸入的是：<span id="wrong-input-display" class="text-red-500"></span></p>
                        <p class="text-gray-700 font-bold">正確答案是：<span id="correct-answer-display" class="text-green-600"></span></p>
                    </div>
                    <div class="text-slate-400 text-sm font-bold animate-pulse">
                        請按下 <span class="bg-slate-100 px-3 py-1 rounded text-slate-600">ENTER</span> 繼續下一題
                    </div>
                </div>
            </div>
        </div>

        <div id="result-screen" class="hidden text-center space-y-8 flex-grow flex flex-col justify-center items-center">
            <h2 class="text-4xl font-bold text-slate-800">練習完成！</h2>
            <div class="text-8xl" id="final-stars-display">⭐⭐⭐⭐⭐</div>
            <div class="text-xl text-slate-600 font-bold">獲得星數：<span id="final-star-count" class="font-bold text-yellow-500">0</span> / <span id="total-possible-stars">50</span></div>
            <button onclick="backToMenu()" class="bg-slate-800 text-white px-10 py-3 rounded-lg text-lg font-bold shadow-md hover:bg-slate-900 transition">返回主選單</button>
        </div>

        <div id="pause-screen" class="hidden absolute inset-0 bg-white/90 backdrop-blur-sm flex flex-col items-center justify-center z-30 space-y-6">
            <h2 class="text-3xl font-bold text-slate-700">遊戲暫停</h2>
            <div class="flex space-x-4">
                <button onclick="togglePause()" class="bg-blue-600 text-white px-8 py-2 rounded-lg font-bold">繼續練習</button>
                <button onclick="backToMenu()" class="bg-slate-200 text-slate-600 px-8 py-2 rounded-lg font-bold">結束挑戰</button>
            </div>
        </div>
    </div>

    <script>
        // --- 輔助函數：解析字串以節省空間，方便未來擴充到 5000+ 字 ---
        // 格式： 英文=中文|英文=中文
        function parseEnglish(rawStr) {
            return rawStr.split('|').map(item => {
                const parts = item.split('=');
                return { word: parts[0], mean: parts[1] };
            });
        }
        // 格式： 漢字=注音=拼音|漢字=注音=拼音
        function parseChinese(rawStr) {
            return rawStr.split('|').map(item => {
                const parts = item.split('=');
                return { t: parts[0], z: parts[1], p: parts[2] };
            });
        }

        // ==========================================
        // 擴充題庫區 (以壓縮字串儲存，不怕佔用大量版面)
        // 你可以依照這種格式，不斷在字串後面加上「|單字=翻譯」，無上限擴充！
        // ==========================================
        
        // 青銅 (入門) 基礎單字
        const RAW_BRONZE = "Apple=蘋果|Banana=香蕉|Orange=橘子|Grapes=葡萄|Strawberry=草莓|Lemon=檸檬|Peach=桃子|Mango=芒果|Melon=甜瓜|Cherry=櫻桃|Dog=狗|Cat=貓|Bird=鳥|Horse=馬|Lion=獅子|Table=桌子|Chair=椅子|Window=窗戶|Door=門|Book=書|Water=水|Fire=火|Earth=地球|Sun=太陽|Moon=月亮|Star=星星|Tree=樹木|Flower=花朵|Grass=草|River=河流|Mountain=山|Cloud=雲|Rain=雨|Snow=雪|Wind=風|House=房子|Car=汽車|Bus=公車|Train=火車|Bicycle=腳踏車|School=學校|Student=學生|Teacher=老師|Pen=筆|Paper=紙|Clock=時鐘|Phone=手機|Computer=電腦|Music=音樂|Art=藝術";
        
        // 白銀 (進階) 中高級單字
        const RAW_SILVER = "Architecture=建築學|Communication=溝通|Psychology=心理學|Environment=環境|Biology=生物學|Atmosphere=大氣層|Government=政府|University=大學|Literature=文學|Stethoscope=聽診器|Vaccination=疫苗|Surgery=手術|Pharmacy=藥局|Microscope=顯微鏡|Satellite=衛星|Generator=發電機|Philosophy=哲學|Economy=經濟|Technology=科技|Innovation=創新|Investment=投資|Strategy=策略|Negotiation=談判|Leadership=領導力|Adventure=冒險|Destination=目的地|Journey=旅程|Experience=經驗|Knowledge=知識|Wisdom=智慧|Happiness=幸福|Success=成功|Failure=失敗|Opportunity=機會|Challenge=挑戰|Solution=解決方案|Analysis=分析|Research=研究|Development=發展|Evolution=演化|Tradition=傳統|Culture=文化|Diversity=多樣性|Equality=平等|Justice=正義|Freedom=自由|Responsibility=責任|Community=社區|Society=社會";

        // 王者 (片語與短句)
        const RAW_GOLD = "A piece of cake=易如反掌|Better late than never=亡羊補牢|Break a leg=祝你好運|Call it a day=到此為止|Kill two birds with one stone=一箭雙鵰|Under the weather=身體不適|Once in a blue moon=千載難逢|Beat around the bush=拐彎抹角|Bite off more than you can chew=貪多嚼不爛|So far so good=目前為止還不錯|No pain no gain=一分耕耘一分收穫|Time is money=時間就是金錢|Practice makes perfect=熟能生巧|Actions speak louder than words=坐而言不如起而行|Don't judge a book by its cover=勿以貌取人|When in Rome do as the Romans do=入境隨俗|The early bird catches the worm=早起的鳥兒有蟲吃|Easy come easy go=來得容易去得快|Out of sight out of mind=眼不見為淨|Ignorance is bliss=無知就是福";

        // 地獄 (長篇名句)
        const RAW_HELL = "Twinkle, twinkle, little star, How I wonder what you are!=一閃一閃亮晶晶，我好奇你在何方。|London Bridge is falling down, Falling down, falling down.=倫敦大橋倒下來，倒下來。|To be, or not to be, that is the question.=生存還是毀滅，這是個問題。|The woods are lovely, dark and deep, But I have promises to keep.=林間幽靜深邃，但我有承諾須履行。|I have a dream that one day this nation will rise up.=我有一個夢想，有朝一日這個國家將會奮起。|Ask not what your country can do for you, ask what you can do for your country.=不要問國家能為你做什麼，要問你能為國家做什麼。|That's one small step for man, one giant leap for mankind.=這是我個人的一小步，卻是人類的一大步。|The only thing we have to fear is fear itself.=我們唯一需要恐懼的，就是恐懼本身。";

        // 中文基礎 (單字) - 可以自由無限添加
        const RAW_CHINESE_SINGLE = "大=ㄉㄚˋ=dà|天=ㄊㄧㄢ=tiān|水=ㄕㄨㄟˇ=shuǐ|人=ㄖㄣˊ=rén|山=ㄕㄢ=shān|木=ㄇㄨˋ=mù|日=ㄖˋ=rì|月=ㄩㄝˋ=yuè|金=ㄐㄧㄣ=jīn|火=ㄏㄨㄛˇ=huǒ|土=ㄊㄨˇ=tǔ|風=ㄈㄥ=fēng|雨=ㄩˇ=yǔ|雷=ㄌㄟˊ=léi|電=ㄉㄧㄢˋ=diàn|心=ㄒㄧㄣ=xīn|手=ㄕㄡˇ=shǒu|足=ㄗㄨˊ=zú|口=ㄎㄡˇ=kǒu|目=ㄇㄨˋ=mù";
        const RAW_CHINESE_IDIOM = "一心一意=ㄧ ㄒㄧㄣ ㄧ ㄧˋ=yī xīn yì yì|半途而廢=ㄅㄢˋ ㄊㄨˊ ㄦˊ ㄈㄟˋ=bàn tú ér fèi|百折不撓=ㄅㄞˇ ㄓㄜˊ ㄅㄨˋ ㄋㄠˊ=bǎi zhé bù náo|亡羊補牢=ㄨㄤˊ ㄧㄤˊ ㄅㄨˇ ㄌㄠˊ=wáng yáng bǔ láo|守株待兔=ㄕㄡˇ ㄓㄨ ㄉㄞˋ ㄊㄨˋ=shǒu zhū dài tù|畫蛇添足=ㄏㄨㄚˋ ㄕㄜˊ ㄊㄧㄢ ㄗㄨˊ=huà shé tiān zú|井底之蛙=ㄐㄧㄥˇ ㄉㄧˇ ㄓ ㄨㄚ=jǐng dǐ zhī wā|拔苗助長=ㄅㄚˊ ㄇㄧㄠˊ ㄓㄨˋ ㄓㄤˇ=bá miáo zhù zhǎng|狐假虎威=ㄏㄨˊ ㄐㄧㄚˇ ㄏㄨˇ ㄨㄟ=hú jiǎ hǔ wēi|盲人摸象=ㄇㄤˊ ㄖㄣˊ ㄇㄛ ㄒㄧㄤˋ=máng rén mō xiàng";
        const RAW_CHINESE_HELL = "起初，神創造天地。=聖經=ㄑㄧˇ ㄔㄨ，ㄕㄣˊ ㄔㄨㄤˋ ㄗㄠˋ ㄊㄧㄢ ㄉㄧˋ|學而時習之，不亦說乎？=論語=ㄒㄩㄝˊ ㄦˊ ㄕˊ ㄒㄧˊ ㄓ，ㄅㄨˋ ㄧˋ ㄩㄝˋ ㄏㄨ？|道可道，非常道；名可名，非常名。=道德經=ㄉㄠˋ ㄎㄜˇ ㄉㄠˋ，ㄈㄟ ㄔㄤˊ ㄉㄠˋ；ㄇㄧㄥˊ ㄎㄜˇ ㄇㄧㄥˊ，ㄈㄟ ㄔㄤˊ ㄇㄧㄥˊ。";

        const ENGLISH_BRONZE = parseEnglish(RAW_BRONZE);
        const ENGLISH_SILVER = parseEnglish(RAW_SILVER);
        const ENGLISH_GOLD = parseEnglish(RAW_GOLD);
        const ENGLISH_HELL = parseEnglish(RAW_HELL);

        const SINGLE_CHARS_POOL = parseChinese(RAW_CHINESE_SINGLE);
        const IDIOMS_MASTER_POOL = parseChinese(RAW_CHINESE_IDIOM);
        const HELL_CHAPTERS_POOL = parseChinese(RAW_CHINESE_HELL).map(item => ({word: item.t, title: item.z, z: item.p})); // 稍微適應舊有結構

        let gameState = {
            mode: 'zhuyin',
            level: 'bronze',
            currentIndex: 1,
            totalQuestions: 50,
            stars: 0,
            timer: 0,
            maxTimer: 30,
            isPaused: false,
            isChecking: false,
            currentWord: '',
            timerInterval: null,
            sessionPool: []
        };

        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function setMode(mode) {
            gameState.mode = mode;
            const buttons = document.querySelectorAll('.mode-btn');
            buttons.forEach(btn => {
                btn.classList.remove('border-blue-500', 'bg-blue-50');
                btn.classList.add('border-slate-200');
                if (btn.getAttribute('onclick').includes(`'${mode}'`)) {
                    btn.classList.remove('border-slate-200');
                    btn.classList.add('border-blue-500', 'bg-blue-50');
                }
            });
        }

        function setLevel(level) {
            gameState.level = level;
            const buttons = document.querySelectorAll('.level-btn');
            buttons.forEach(btn => {
                btn.classList.remove('border-orange-500', 'bg-orange-50', 'border-blue-500', 'bg-blue-50', 'border-yellow-500', 'bg-yellow-50', 'border-red-500', 'bg-red-50');
                btn.classList.add('border-slate-200');
                if (btn.getAttribute('onclick').includes(`'${level}'`)) {
                    btn.classList.remove('border-slate-200');
                    const color = (level === 'bronze') ? 'orange' : (level === 'silver' ? 'blue' : (level === 'gold' ? 'yellow' : 'red'));
                    btn.classList.add(`border-${color}-500`, `bg-${color}-50`);
                }
            });
        }

        function startGame() {
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            // 預設想考的題數
            gameState.totalQuestions = (gameState.level === 'hell') ? 10 : 50;
            gameState.currentIndex = 1;
            gameState.stars = 0;
            gameState.isPaused = false;
            gameState.isChecking = false;
            
            initializePool();
            updateDisplayHeader();
            nextQuestion();
        }

        function initializePool() {
            let basePool = [];
            const isChineseMode = ['zhuyin', 'cangjie', 'pinyin_trad', 'pinyin_simp'].includes(gameState.mode);

            if (gameState.mode === 'english') {
                if (gameState.level === 'bronze') basePool = ENGLISH_BRONZE;
                else if (gameState.level === 'silver') basePool = ENGLISH_SILVER;
                else if (gameState.level === 'gold') basePool = ENGLISH_GOLD;
                else basePool = ENGLISH_HELL;
            } else if (isChineseMode) {
                if (gameState.level === 'hell') basePool = HELL_CHAPTERS_POOL;
                else if (gameState.level === 'gold') basePool = IDIOMS_MASTER_POOL;
                else basePool = SINGLE_CHARS_POOL;
            } else {
                basePool = [{word:"，",hint:"逗號"}, {word:"。",hint:"句號"}, {word:"！",hint:"驚嘆號"}];
            }

            // --- 核心不重複機制 ---
            let shuffled = shuffleArray(basePool);
            
            // 檢查庫存數量：如果題庫不夠總題數，就只考題庫能提供的最大數量，確保 100% 不重複
            let actualQuestions = Math.min(gameState.totalQuestions, shuffled.length);
            gameState.totalQuestions = actualQuestions;
            document.getElementById('total-q-display').innerText = gameState.totalQuestions;

            // 直接切出所需的數量放進 sessionPool，打完即止
            gameState.sessionPool = shuffled.slice(0, actualQuestions);
        }

        function updateDisplayHeader() {
            const modeNames = { 'zhuyin':'注音中打', 'cangjie':'倉頡中打', 'pinyin_trad':'漢語拼音(繁)', 'pinyin_simp':'漢語拼音(簡)', 'english':'英文打字', 'punctuation':'標點練習' };
            const levelNames = { 'bronze':'青銅', 'silver':'白銀', 'gold':'王者', 'hell':'地獄' };
            document.getElementById('display-mode').innerText = modeNames[gameState.mode];
            document.getElementById('display-level').innerText = levelNames[gameState.level];
            document.getElementById('star-count').innerText = gameState.stars;
        }

        function nextQuestion() {
            // 如果題庫已經全部出完了，就結束遊戲
            if (gameState.currentIndex > gameState.totalQuestions || gameState.sessionPool.length === 0) { 
                endGame(); 
                return; 
            }
            
            gameState.isChecking = false;
            document.getElementById('progress').innerText = gameState.currentIndex;
            const input = document.getElementById('typing-input');
            input.value = '';
            input.disabled = false;
            input.classList.remove('border-green-500', 'border-red-500', 'text-green-600', 'text-red-600');
            input.classList.add('border-slate-300');
            input.focus();
            setupWord();
            resetTimer();
        }

        function getZhuyinHTML(char, zhuyin) {
            if (!zhuyin || "，。？！：；、；".includes(char)) return `<span class="symbol-text">${char}</span>`;
            let tone = "";
            let symbols = zhuyin;
            if (zhuyin.includes("ˊ")) { tone = "ˊ"; symbols = zhuyin.replace("ˊ", ""); }
            else if (zhuyin.includes("ˇ")) { tone = "ˇ"; symbols = zhuyin.replace("ˇ", ""); }
            else if (zhuyin.includes("ˋ")) { tone = "ˋ"; symbols = zhuyin.replace("ˋ", ""); }
            else if (zhuyin.includes("˙")) { tone = "˙"; symbols = zhuyin.replace("˙", ""); }
            let toneHTML = (tone === "˙") ? `<span class="tone-top">˙</span>` : (tone !== "" ? `<span class="tone-side">${tone}</span>` : "");
            return `<div class="char-unit"><span class="char-text">${char}</span><div class="zhuyin-wrapper">${tone === "˙" ? toneHTML : ""}<span class="zhuyin-symbols">${symbols}</span>${tone !== "˙" ? toneHTML : ""}</div></div>`;
        }

        function setupWord() {
            // 從陣列尾端取出題目 (不重複)
            const item = gameState.sessionPool.pop(); 
            const target = document.getElementById('target-main');
            const assist = document.getElementById('assist-hint');
            const info = document.getElementById('article-info');

            target.innerHTML = "";
            assist.innerHTML = "";
            info.innerText = "";

            const isChineseMode = ['zhuyin', 'cangjie', 'pinyin_trad', 'pinyin_simp'].includes(gameState.mode);

            if (isChineseMode) {
                const isPinyin = gameState.mode.includes('pinyin');
                const wordStr = (item.t || item.word || "");
                const charArr = wordStr.split("");
                const zhuyinArr = (item.z || "").split(/[\s，。？！：；、]+/);
                
                let zIndex = 0;
                charArr.forEach(c => {
                    if ("，。？！：；、".includes(c)) target.innerHTML += `<span class="symbol-text">${c}</span>`;
                    else { target.innerHTML += getZhuyinHTML(c, zhuyinArr[zIndex] || ""); zIndex++; }
                });

                if (isPinyin) assist.innerHTML = `<div class="pinyin-assist">漢語拼音：${item.p || ""}</div>`;
                target.style.fontSize = wordStr.length > 50 ? "2.2rem" : "3.5rem";
                gameState.currentWord = isPinyin ? (item.p.replace(/\s/g, '').toLowerCase()) : wordStr;
            } else if (gameState.mode === 'english') {
                target.innerHTML = `<div>${item.word}</div><div class="english-translation">翻譯：${item.mean}</div>`;
                target.style.fontSize = item.word.length > 50 ? "1.8rem" : "3rem";
                gameState.currentWord = item.word;
            } else {
                target.innerText = item.word;
                target.style.fontSize = "4.5rem";
                gameState.currentWord = item.word;
            }
        }

        function resetTimer() {
            clearInterval(gameState.timerInterval);
            if (gameState.level === 'hell') { document.getElementById('timer-container').classList.add('invisible'); return; }
            document.getElementById('timer-container').classList.remove('invisible');
            
            if (gameState.level === 'bronze') {
                gameState.maxTimer = 30;
            } else if (gameState.level === 'silver') {
                gameState.maxTimer = 15;
            } else {
                gameState.maxTimer = 10;
            }

            gameState.timer = gameState.maxTimer;
            updateTimerBar();
            gameState.timerInterval = setInterval(() => {
                if (!gameState.isPaused && !gameState.isChecking) {
                    gameState.timer -= 0.1;
                    updateTimerBar();
                    if (gameState.timer <= 0) checkAnswer(true);
                }
            }, 100);
        }

        function updateTimerBar() {
            const pct = (gameState.timer / gameState.maxTimer) * 100;
            document.getElementById('timer-bar').style.width = pct + "%";
            document.getElementById('timer-bar').className = pct < 30 ? "timer-bar h-full bg-red-500 w-full" : "timer-bar h-full bg-blue-500 w-full";
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const fbWrong = document.getElementById('feedback-wrong');
                if (gameState.isChecking && fbWrong.style.display !== 'none') proceedToNext();
                else if (!gameState.isChecking) checkAnswer();
            }
        });

        function checkAnswer(isTimeOut = false) {
            if (gameState.isChecking) return;
            gameState.isChecking = true;
            clearInterval(gameState.timerInterval);
            
            const input = document.getElementById('typing-input');
            let userInput = input.value.trim();
            let target = gameState.currentWord;
            
            if (gameState.mode.includes('pinyin') || gameState.mode === 'english') {
                userInput = userInput.toLowerCase().replace(/\s/g, '');
                target = target.toLowerCase().replace(/\s/g, '');
            }

            const isCorrect = !isTimeOut && (userInput === target);
            input.disabled = true;

            if (isCorrect) {
                gameState.stars += (gameState.level === 'hell' ? 10 : 1);
                document.getElementById('star-count').innerText = gameState.stars;
                const fb = document.getElementById('feedback-correct');
                fb.classList.remove('hidden'); fb.classList.add('feedback-pop');
                input.classList.replace('border-slate-300', 'border-green-500');
                input.classList.add('text-green-600');
                setTimeout(() => {
                    fb.classList.add('hidden'); fb.classList.remove('feedback-pop');
                    gameState.currentIndex++; nextQuestion();
                }, 1000);
            } else {
                document.getElementById('wrong-input-display').innerText = isTimeOut ? "(逾時)" : (input.value || "(空白)");
                document.getElementById('correct-answer-display').innerText = gameState.currentWord;
                const fb = document.getElementById('feedback-wrong');
                fb.style.display = 'block'; fb.classList.remove('hidden');
                input.classList.replace('border-slate-300', 'border-red-500');
                input.classList.add('text-red-600');
            }
        }

        function proceedToNext() {
            const fbWrong = document.getElementById('feedback-wrong');
            fbWrong.style.display = 'none'; fbWrong.classList.add('hidden');
            gameState.currentIndex++; nextQuestion();
        }
        
        function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            let possibleStars = gameState.totalQuestions * (gameState.level === 'hell' ? 10 : 1);
            document.getElementById('final-star-count').innerText = gameState.stars;
            document.getElementById('total-possible-stars').innerText = possibleStars;
            
            let ratio = gameState.stars / possibleStars;
            let finalStars = "⭐";
            if(ratio > 0.3) finalStars = "⭐⭐";
            if(ratio > 0.6) finalStars = "⭐⭐⭐";
            if(ratio > 0.8) finalStars = "⭐⭐⭐⭐";
            if(ratio === 1) finalStars = "⭐⭐⭐⭐⭐";
            document.getElementById('final-stars-display').innerText = finalStars;
        }

        function togglePause() {
            if (gameState.isChecking) return;
            gameState.isPaused = !gameState.isPaused;
            document.getElementById('pause-screen').classList.toggle('hidden', !gameState.isPaused);
            if (!gameState.isPaused) document.getElementById('typing-input').focus();
        }

        function backToMenu() {
            clearInterval(gameState.timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('pause-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            const fbWrong = document.getElementById('feedback-wrong');
            fbWrong.classList.add('hidden'); fbWrong.style.display = 'none';
            document.getElementById('menu-screen').classList.remove('hidden');
        }

        window.onload = () => { setMode('zhuyin'); setLevel('bronze'); };
    </script>
</body>
</html>
